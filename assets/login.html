<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/global/style.css">
    <link rel="stylesheet" href="./css/login.css">
    <title>Login</title>
</head>
<body>
    <div class="caixa-login">
        <div class="painel-esquerdo">
            
            <div class="formulario-conteudo">
                <h1>Entre agora</h1>
                <p class="texto-boas-vindas">Entre com Email & Senha</p>

                <div class="grupo-campo">
                    <label>E-mail</label>
                    <input type="email" placeholder="digite o seu e-mail">
                </div>

                <div class="grupo-campo">
                    <label>Senha</label>
                    <input type="password" placeholder="digite a sua senha">
                </div>

                <div class="opcoes-acesso">
                    <!-- <label class="opcao-lembrar">
                        <input type="checkbox"> Lembrar senha
                    </label> -->
                    <a href="#" class="link-esqueci-senha">Esqueci minha senha</a>
                </div>

                <button class="botao-entrar">ENTRAR</button>

                <!-- <button class="botao-google">
                    <img src="./assets/icones/google.png" alt="G">
                    Ou fazer login com o Google
                </button> -->
            </div>
        </div>

        <div class="painel-direito">
            <div class="conteudo-azul">
                <h2>Começar planejamento</h2>
                <p>Crie uma conta e comece a se organizar agora!</p>
                <button class="botao-comecar">COMEÇAR</button>
            </div>
        </div>
    </div>
</body>
</html>
