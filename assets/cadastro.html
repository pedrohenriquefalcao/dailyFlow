<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/global/style.css">
    <link rel="stylesheet" href="./css/cadastro.css">
    <title>Criar Conta - DailyFlow</title>
</head>
<body>
    <div class="caixa-cadastro">
        
        <div class="cadastro-painel-azul">
            <div class="conteudo-informativo">
                <h2>Já tenho uma conta</h2>
                <p>Entre com seu Email e Senha</p>
                <button class="btn-entrar-outline">ENTRAR</button>
            </div>
        </div>

        <div class="cadastro-painel-branco">
            <div class="formulario-cadastro">
                <h1>Crie uma conta</h1>
                <p class="subtitulo-cadastro">Registre com Email</p>

                <div class="campo-input">
                    <input type="text" placeholder="Digite seu nome">
                </div>

                <div class="campo-input">
                    <input type="text" placeholder="Sobrenome">
                </div>

                <div class="campo-input">
                    <input type="email" placeholder="Seu melhor Email">
                </div>

                <div class="campo-input">
                    <input type="tel" placeholder="Um telefone (55 71 9 1234-5678)">
                </div>

                <div class="campo-input">
                    <input type="password" placeholder="Digite a sua senha">
                </div>

                <div class="campo-input">
                    <input type="password" placeholder="Confirme a senha">
                </div>

                <button class="btn-criar-conta">CRIAR CONTA</button>
            </div>
        </div>

    </div>
</body>
</html>
