<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/global/style.css">
    <link rel="stylesheet" href="./css/telas/tela-perfil.css">
    <title>Perfil - DailyFlow</title>
</head>
<body>
    <div class="layout-app">
        
        <aside class="barra-lateral">
            <div class="menu-topo">
                <a href="#"><img src="./assets/icons/menu-burger.svg" alt="Menu"></a>
            </div>
            <div class="icones-centrais">
                <a href="#"><img src="./assets/icons/home.svg" alt="Início"></a>
                <a href="#"><img src="./assets/icons/usuario.svg" alt="Perfil"></a>
                <a href="#"><img src="./assets/icons/lua.svg" alt="Alternar Tema"></a>
            </div>
            <div class="config-baixo">
                <a href="#"><img src="./assets/icons/engrenagem.svg" alt="Configurações"></a>
            </div>
        </aside>

        <main class="conteudo-principal">
            
            <header class="cabecalho-perfil">
                <div class="rotulo-titulo">Perfil</div>
            </header>

            <section class="cartao-perfil">
                
                <button class="botao-sair">
                    <img src="./assets/icons/logout.svg" alt="Sair da conta">
                </button>

                <div class="avatar-perfil">
                    <img src="./assets/icons/usuario-default.svg" alt="Foto de Perfil">
                </div>

                <form class="formulario-perfil">
                    <div class="grupo-input">
                        <label>Usuário</label>
                        <input type="text" value="Zé" readonly>
                    </div>
                    
                    <div class="grupo-input">
                        <label>Nome</label>
                        <input type="text" value="José Oliveira Gomes Dos Santos" readonly>
                    </div>
                    
                    <div class="grupo-input">
                        <label>Email</label>
                        <input type="email" value="josezito03200sucesso@gmail.com" readonly>
                    </div>
                    
                    <div class="grupo-input">
                        <label>Senha</label>
                        <div class="input-com-icone">
                            <input type="password" value="123sucessojoze222" readonly>
                            <button type="button" class="botao-mostrar-senha">
                                <img src="./assets/icons/olho-esconde-senha.svg" alt="Mostrar/Ocultar Senha">
                            </button>
                        </div>
                    </div>
                </form>

            </section>
            
        </main>
    </div>



    
</body>
</html>
